<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium Wallpaper Gallery - High quality wallpapers for mobile and desktop">
  <title>Wallora • Premium Wallpapers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); }
    .wallpaper-grid img { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .wallpaper-grid img:hover { transform: scale(1.08); filter: brightness(1.1); }
    .modal { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .skeleton { animation: pulse 1.5s infinite; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-mountain text-2xl text-violet-400"></i>
        <h1 class="text-2xl font-bold tracking-tight">Wallora</h1>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="relative w-80">
          <input id="searchInput" 
                 type="text" 
                 placeholder="Search wallpapers..." 
                 class="w-full bg-zinc-900 border border-white/10 rounded-full py-3 px-5 pl-12 focus:outline-none focus:border-violet-500 transition-colors">
          <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-400"></i>
        </div>
        
        <select id="sortSelect" class="bg-zinc-900 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-violet-500">
          <option value="newest">Newest</option>
          <option value="az">A-Z</option>
          <option value="favorites">Favorites</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="pt-24 pb-12 text-center bg-gradient-to-b from-zinc-900 to-zinc-950">
    <h2 class="text-5xl md:text-6xl font-bold mb-4">Discover Premium Wallpapers</h2>
    <p class="text-zinc-400 text-xl max-w-2xl mx-auto">Handpicked collection for mobile and desktop</p>
    <div id="counter" class="mt-6 text-sm text-zinc-500"></div>
  </header>

  <!-- Filters -->
  <div class="max-w-7xl mx-auto px-4 py-6 flex flex-wrap gap-3 justify-center">
    <button onclick="filterCategory(this)" data-category="all" class="active-filter px-6 py-2 rounded-full bg-violet-600 hover:bg-violet-500 transition">All</button>
    <button onclick="filterCategory(this)" data-category="mobile" class="px-6 py-2 rounded-full glass hover:bg-white/10 transition">Mobile</button>
    <button onclick="filterCategory(this)" data-category="desktop" class="px-6 py-2 rounded-full glass hover:bg-white/10 transition">Desktop</button>
    <button onclick="filterCategory(this)" data-category="nature" class="px-6 py-2 rounded-full glass hover:bg-white/10 transition">Nature</button>
    <button onclick="filterCategory(this)" data-category="abstract" class="px-6 py-2 rounded-full glass hover:bg-white/10 transition">Abstract</button>
  </div>

  <!-- Wallpaper Grid -->
  <main class="max-w-7xl mx-auto px-4 pb-20">
    <div id="skeleton" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
    <div id="wallpaperGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
  </main>

  <!-- Fullscreen Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
    <div class="relative w-full max-w-5xl mx-auto modal">
      <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-zinc-900 text-white p-4 rounded-full hover:bg-red-500 transition z-10">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      
      <img id="modalImage" class="max-h-[85vh] w-full object-contain mx-auto rounded-2xl" alt="">
      
      <div class="flex justify-center gap-6 mt-6">
        <button onclick="prevImage()" class="glass px-8 py-4 rounded-2xl hover:bg-white/10 transition text-xl"><i class="fa-solid fa-chevron-left"></i></button>
        <button onclick="downloadCurrent()" class="glass px-8 py-4 rounded-2xl hover:bg-white/10 transition flex items-center gap-3">
          <i class="fa-solid fa-download"></i> Download
        </button>
        <button onclick="toggleFavorite(currentIndex)" id="modalFavBtn" class="glass px-8 py-4 rounded-2xl hover:bg-white/10 transition">
          <i class="fa-solid fa-heart"></i>
        </button>
        <button onclick="shareCurrent()" class="glass px-8 py-4 rounded-2xl hover:bg-white/10 transition"><i class="fa-solid fa-share"></i></button>
        <button onclick="nextImage()" class="glass px-8 py-4 rounded-2xl hover:bg-white/10 transition text-xl"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <!-- Scroll to Top -->
  <button id="scrollTop" onclick="scrollToTop()" class="fixed bottom-8 right-8 bg-violet-600 hover:bg-violet-500 w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl transition hidden">
    <i class="fa-solid fa-arrow-up text-xl"></i>
  </button>

  <script>
    let wallpapers = [];
    let currentIndex = 0;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentFilter = 'all';

    // Tailwind Script
    function initTailwind() {
      // Already loaded via CDN
    }

    async function loadWallpapers() {
      try {
        const res = await fetch('wallpapers.json');
        wallpapers = await res.json();
        renderSkeletons();
        setTimeout(() => renderWallpapers(), 400);
        updateCounter();
      } catch (e) {
        console.error("Failed to load wallpapers", e);
      }
    }

    function renderSkeletons() {
      const skeleton = document.getElementById('skeleton');
      skeleton.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        skeleton.innerHTML += `
          <div class="aspect-[9/16] md:aspect-square bg-zinc-900 rounded-3xl skeleton"></div>
        `;
      }
    }

    function renderWallpapers(filtered = null) {
      const container = document.getElementById('wallpaperGrid');
      container.innerHTML = '';
      document.getElementById('skeleton').classList.add('hidden');

      const toRender = filtered || wallpapers;

      toRender.forEach((filename, index) => {
        const globalIndex = wallpapers.indexOf(filename);
        const isFav = favorites.includes(filename);
        
        const div = document.createElement('div');
        div.className = `group relative aspect-[9/16] md:aspect-square overflow-hidden rounded-3xl cursor-pointer bg-zinc-900`;
        div.innerHTML = `
          <img src="wallpapers/${filename}" 
               data-src="wallpapers/${filename}" 
               loading="lazy"
               class="w-full h-full object-cover wallpaper-grid" 
               alt="${filename}">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition"></div>
          <button onclick="event.stopImmediatePropagation(); toggleFavorite(${globalIndex});" 
                  class="absolute top-4 right-4 ${isFav ? 'text-red-500' : 'text-white/70'} hover:text-red-500 transition">
            <i class="fa-solid fa-heart text-2xl drop-shadow"></i>
          </button>
          <div class="absolute bottom-4 left-4 text-xs bg-black/50 px-3 py-1 rounded-full backdrop-blur">${filename.split('.').pop().toUpperCase()}</div>
        `;
        div.onclick = () => openModal(globalIndex);
        container.appendChild(div);
      });
    }

    function openModal(index) {
      currentIndex = index;
      const modal = document.getElementById('modal');
      const img = document.getElementById('modalImage');
      img.src = `wallpapers/${wallpapers[index]}`;
      modal.classList.remove('hidden');
      updateModalFavButton();
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = 'visible';
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % wallpapers.length;
      document.getElementById('modalImage').src = `wallpapers/${wallpapers[currentIndex]}`;
      updateModalFavButton();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + wallpapers.length) % wallpapers.length;
      document.getElementById('modalImage').src = `wallpapers/${wallpapers[currentIndex]}`;
      updateModalFavButton();
    }

    function updateModalFavButton() {
      const btn = document.getElementById('modalFavBtn');
      const isFav = favorites.includes(wallpapers[currentIndex]);
      btn.innerHTML = `<i class="fa-solid fa-heart ${isFav ? 'text-red-500' : ''}"></i>`;
    }

    function toggleFavorite(index) {
      const filename = wallpapers[index];
      if (favorites.includes(filename)) {
        favorites = favorites.filter(f => f !== filename);
      } else {
        favorites.push(filename);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      renderWallpapers();
      updateModalFavButton();
    }

    function downloadCurrent() {
      const link = document.createElement('a');
      link.href = `wallpapers/${wallpapers[currentIndex]}`;
      link.download = wallpapers[currentIndex];
      link.click();
    }

    function shareCurrent() {
      const url = `\( {window.location.origin}/wallpapers/ \){wallpapers[currentIndex]}`;
      navigator.clipboard.writeText(url).then(() => {
        alert("Image link copied to clipboard!");
      });
    }

    function updateCounter() {
      document.getElementById('counter').textContent = `${wallpapers.length} Premium Wallpapers`;
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = wallpapers.filter(f => f.toLowerCase().includes(term));
      renderWallpapers(filtered);
    });

    // Sort
    document.getElementById('sortSelect').addEventListener('change', (e) => {
      let sorted = [...wallpapers];
      if (e.target.value === 'az') {
        sorted.sort();
      } else if (e.target.value === 'favorites') {
        sorted = sorted.filter(f => favorites.includes(f));
      }
      renderWallpapers(sorted);
    });

    // Category Filter (Basic - you can extend by naming convention)
    function filterCategory(btn) {
      document.querySelectorAll('button[data-category]').forEach(b => b.classList.remove('active-filter', 'bg-violet-600'));
      btn.classList.add('active-filter', 'bg-violet-600');
      
      currentFilter = btn.dataset.category;
      // For now, show all (you can improve by adding metadata later)
      renderWallpapers();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('modal').classList.contains('hidden')) return;
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'Escape') closeModal();
    });

    // Scroll to top visibility
    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('hidden', window.scrollY < 500);
    });

    // Initialize
    window.onload = loadWallpapers;
  </script>
</body>
</html>
